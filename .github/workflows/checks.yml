name: CI Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: corepack enable && yarn --version
      - run: rm -rf .yarn/cache
      - run: rm -f yarn.lock
      - run: yarn install --mode=update
      - run: yarn workspaces list
      - run: yarn cichecks
